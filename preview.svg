<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2419;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a4a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.03" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Map pins decoration - right side -->
  <!-- Pin 1 - burger van -->
  <g transform="translate(820, 180)">
    <rect x="0" y="0" width="140" height="38" rx="8" fill="#1a7a4a" opacity="0.9"/>
    <text x="12" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="white">🍔 Burger Van</text>
    <rect x="65" y="38" width="2" height="20" fill="#1a7a4a"/>
    <circle cx="66" cy="62" r="5" fill="#1a7a4a"/>
  </g>

  <!-- Pin 2 - car boot -->
  <g transform="translate(950, 280)">
    <rect x="0" y="0" width="150" height="38" rx="8" fill="#ff6b2b" opacity="0.9"/>
    <text x="12" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="white">🎡 Car Boot Sale</text>
    <rect x="71" y="38" width="2" height="20" fill="#ff6b2b"/>
    <circle cx="72" cy="62" r="5" fill="#ff6b2b"/>
  </g>

  <!-- Pin 3 - street food -->
  <g transform="translate(840, 370)">
    <rect x="0" y="0" width="140" height="38" rx="8" fill="#1a7a4a" opacity="0.9"/>
    <text x="12" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="white">🌮 Street Food</text>
    <rect x="66" y="38" width="2" height="20" fill="#1a7a4a"/>
    <circle cx="67" cy="62" r="5" fill="#1a7a4a"/>
  </g>

  <!-- Pin 4 - village fete -->
  <g transform="translate(970, 420)">
    <rect x="0" y="0" width="140" height="38" rx="8" fill="#ff6b2b" opacity="0.9"/>
    <text x="12" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="white">🎪 Village Fete</text>
    <rect x="66" y="38" width="2" height="20" fill="#ff6b2b"/>
    <circle cx="67" cy="62" r="5" fill="#ff6b2b"/>
  </g>

  <!-- Left side content -->
  <!-- Logo -->
  <text x="80" y="120" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1a7a4a">📍 CaterMap</text>

  <!-- Main headline -->
  <text x="80" y="240" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="white" letter-spacing="-2">Find More</text>
  <text x="80" y="330" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="#1a7a4a" letter-spacing="-2">Pitches.</text>
  <text x="80" y="410" font-family="Arial, sans-serif" font-size="52" font-weight="700" fill="white" opacity="0.85">Earn More Money.</text>

  <!-- Subtext -->
  <text x="80" y="480" font-family="Arial, sans-serif" font-size="22" fill="white" opacity="0.6">Connecting mobile caterers with events across the UK.</text>

  <!-- CTA pill -->
  <rect x="80" y="510" width="260" height="52" rx="26" fill="#ff6b2b"/>
  <text x="210" y="543" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">Join the Waiting List Free</text>

  <!-- Domain -->
  <text x="80" y="608" font-family="Arial, sans-serif" font-size="18" fill="white" opacity="0.4">catermap.co.uk</text>
</svg>
